{% extends "base.html" %}
{% block title %}Order Page{% endblock %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

{% block content %}
<style>
  .order-page {
    background: linear-gradient(135deg, #fff8f2 0%, #f4f8ff 100%);
    border-radius: 24px;
    padding: 28px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .hero-card {
    background: linear-gradient(135deg, #1f3c88 0%, #4a90e2 100%);
    color: white;
    border: none;
    border-radius: 20px;
  }

  .table-card {
    border: none;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
  }

  .table thead {
    background: linear-gradient(135deg, #0d6efd 0%, #4f46e5 100%);
    color: white;
  }

  .form-card {
    border: none;
    border-radius: 20px;
    background: linear-gradient(135deg, #ffffff 0%, #f9fbff 100%);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
    overflow: hidden;
  }

  .form-control {
    min-width: 0;
  }

  .btn-custom {
    background: linear-gradient(135deg, #ff7a00 0%, #ff4d6d 100%);
    color: white;
    border: none;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .btn-custom:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 18px rgba(255, 122, 0, 0.25);
    color: white;
  }

  .btn-secondary-custom {
    background: linear-gradient(135deg, #198754 0%, #20c997 100%);
    color: white;
    border: none;
  }
</style>

<div class="order-page p-3 p-md-4">
  <div class="row justify-content-center mt-2 mt-md-4">
    <div class="col-12 col-lg-8">
      <div class="card form-card p-2 p-md-4">
        <div class="card-body card-hover p-2 p-md-3">
          <h2 class="fw-bold text-center mb-4">➕ Add Your Food</h2>
          <form action="{{ url_for('order') }}" method="POST" class="text-start">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Item Name</label>
                <input name="name" class="form-control form-control-lg" placeholder="Enter item" type="text" required>
              </div>
              <div class="col-md-3">
                <label class="form-label fw-semibold">Price</label>
                <input name="price" class="form-control form-control-lg" placeholder="Enter price" type="number" min="0" step="0.01" required>
              </div>
              <div class="col-md-3">
                <label class="form-label fw-semibold">Quantity</label>
                <input name="quantity" class="form-control form-control-lg" placeholder="Enter quantity" type="number" min="1" required>
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">📍 Your Place</label>
                <input name="place" class="form-control form-control-lg" placeholder="Enter your place" type="text" required>
              </div>
            </div>
            <div class="text-center mt-4">
              <button type="submit" class="btn btn-custom btn-lg px-4">Add Item</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="text-center mb-3 mt-4">
    <a href="{{ url_for('menu') }}" class="btn btn-secondary-custom btn-lg px-4 w-100 w-md-auto">🛒 Order Another</a>
  </div>
{% endblock %}
