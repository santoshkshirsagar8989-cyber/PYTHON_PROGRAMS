{% extends"base.html" %}
{% block title %}Add Another item{% endblock %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="text text-center">Add Another item</h2> 
                <div class="card-body p-4">
                    <form action="{{url_for('add_item')}}" method="POST">
                        <div class="mb-4">
                            <label class="form-label">item_name:<input name = "name" class="form-control" placeholder="Add item" type="text"></label>
                            <label class="form-label">item_price<input name = "price" class="form-control" placeholder="enter price" type="number"></label>
                            <button type="submit" class="btn btn-dark btn-lg mt-3 gap-2 col-5">Item Added !</button>
                    </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
